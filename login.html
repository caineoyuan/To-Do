<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e1e;
            color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        h1 {
            font-family: 'DM Serif Text', serif;
            font-style: italic;
            font-size: 2rem;
            margin-bottom: 24px;
            color: #ffffff;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #1e1e1e;
            color: #f0f0f0;
            font-size: 1rem;
            outline: none;
            margin-bottom: 16px;
        }
        input[type="password"]:focus {
            border-color: #4a90d9;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4a90d9;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #3a7bc8; }
        .error {
            color: #e57373;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }
        .password-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        .password-wrapper input {
            margin-bottom: 0;
            padding-right: 44px;
        }
        .peek-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 1.1rem;
            width: auto;
            padding: 4px;
        }
        .peek-btn:hover { color: #ccc; background: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>To-Do</h1>
        <form id="login-form">
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Password" autofocus />
                <button type="button" class="peek-btn" id="peek-btn" tabindex="-1">👁</button>
            </div>
            <button type="submit">Sign in</button>
        </form>
        <p class="error" id="error-msg">Incorrect password</p>
    </div>
    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const password = document.getElementById("password").value;
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password }),
            });
            if (res.ok) {
                window.location.href = "/";
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        });

        const peekBtn = document.getElementById("peek-btn");
        const pwInput = document.getElementById("password");
        peekBtn.addEventListener("mousedown", () => { pwInput.type = "text"; });
        peekBtn.addEventListener("mouseup", () => { pwInput.type = "password"; });
        peekBtn.addEventListener("mouseleave", () => { pwInput.type = "password"; });
    </script>
</body>
</html>
