<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Quick Add</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" sizes="any">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 8px;
        }
        form {
            display: flex;
            width: 100%;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #555;
            border-radius: 8px;
            background: #1e1e1e;
            color: #f0f0f0;
            font-size: 0.95rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            outline: none;
        }
        input:focus { border-color: #4a90d9; }
        button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: #4a90d9;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            flex-shrink: 0;
        }
        button:hover { background: #3a7bc8; }
        .success {
            color: #4caf50;
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <form id="form">
        <input type="text" id="input" placeholder="Add a task..." autofocus />
        <button type="submit">+</button>
    </form>
    <script>
        const form = document.getElementById("form");
        const input = document.getElementById("input");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const title = input.value.trim();
            if (!title) return;

            try {
                const res = await fetch("/api/tasks", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-API-Key": "c30e37b7-0a39-45db-8808-4ec306e5d9b1"
                    },
                    body: JSON.stringify({ title }),
                });
                if (res.ok) {
                    input.value = "";
                    document.body.innerHTML = '<p class="success">✓ Added</p>';
                    setTimeout(() => window.close(), 600);
                }
            } catch (err) {
                input.style.borderColor = "#e57373";
            }
        });

        // Close on Escape
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") window.close();
        });
    </script>
</body>
</html>
