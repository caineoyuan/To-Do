<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1><svg class="title-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2ZM15.2197 8.96967L10.75 13.4393L8.78033 11.4697C8.48744 11.1768 8.01256 11.1768 7.71967 11.4697C7.42678 11.7626 7.42678 12.2374 7.71967 12.5303L10.2197 15.0303C10.5126 15.3232 10.9874 15.3232 11.2803 15.0303L16.2803 10.0303C16.5732 9.73744 16.5732 9.26256 16.2803 8.96967C15.9874 8.67678 15.5126 8.67678 15.2197 8.96967Z" fill="currentColor"/></svg> To-Do</h1>
        </header>

        <main id="app-content">
            <form id="add-task-form">
                <input type="text" id="task-input" placeholder="Add a task..." autocomplete="off" />
                <button type="submit" class="btn-add">+</button>
            </form>

            <div id="task-list" class="task-list">
                <p class="empty-state">No tasks yet. Add one above!</p>
            </div>

            <details id="completed-section" class="completed-section">
                <summary>Completed</summary>
                <div id="completed-list" class="task-list"></div>
            </details>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
